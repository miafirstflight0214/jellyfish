<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Jellyfish</title>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,200;0,9..144,300;0,9..144,400;1,9..144,200;1,9..144,300&family=JetBrains+Mono:wght@300;400&family=Noto+Serif+SC:wght@300;400&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #111110;
    --surface: #1a1918;
    --border: rgba(201,168,124,0.12);
    --text: #e8e2d9;
    --text-dim: #9a9590;
    --text-muted: #706b66;
    --accent: #c9a87c;
    --accent-dim: rgba(201,168,124,0.08);
    --green: #8ecda0;
    --blue: #7eb3e0;
    --purple: #b8a0d8;
  }

  * { margin:0; padding:0; box-sizing:border-box; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Fraunces', Georgia, serif;
    -webkit-font-smoothing: antialiased;
    min-height: 100vh;
  }

  /* — Masthead — */
  .masthead {
    padding: 60px 80px 40px;
    border-bottom: 1px solid var(--border);
    display: flex;
    align-items: baseline;
    justify-content: space-between;
  }

  .masthead h1 {
    font-size: 11px;
    font-weight: 300;
    letter-spacing: 0.35em;
    text-transform: uppercase;
    color: var(--accent);
  }

  .masthead .issue {
    font-family: 'JetBrains Mono', monospace;
    font-size: 10px;
    font-weight: 300;
    color: var(--text-muted);
    letter-spacing: 0.05em;
  }

  /* — Hero — */
  .hero {
    padding: 80px 80px 60px;
    border-bottom: 1px solid var(--border);
  }

  .hero-title {
    font-size: 72px;
    font-weight: 200;
    line-height: 1.05;
    color: var(--text);
    letter-spacing: -0.02em;
    max-width: 700px;
  }

  .hero-sub {
    font-size: 16px;
    font-weight: 300;
    color: var(--text-dim);
    margin-top: 20px;
    font-style: italic;
  }

  /* — Stats Strip — */
  .stats-strip {
    display: flex;
    border-bottom: 1px solid var(--border);
  }

  .stat-cell {
    flex: 1;
    padding: 32px 40px;
    border-right: 1px solid var(--border);
    text-align: center;
  }

  .stat-cell:last-child { border-right: none; }

  .stat-number {
    font-size: 36px;
    font-weight: 200;
    color: var(--text);
    line-height: 1;
  }

  .stat-label {
    font-family: 'JetBrains Mono', monospace;
    font-size: 9px;
    letter-spacing: 0.15em;
    text-transform: uppercase;
    color: var(--text-muted);
    margin-top: 8px;
  }

  /* — Agent Profiles — */
  .profiles {
    display: grid;
    grid-template-columns: 1fr 1fr 1fr;
  }

  .profile {
    padding: 60px 48px;
    border-right: 1px solid var(--border);
    border-bottom: 1px solid var(--border);
    position: relative;
  }

  .profile:last-child { border-right: none; }

  .profile-number {
    font-family: 'JetBrains Mono', monospace;
    font-size: 10px;
    color: var(--text-muted);
    letter-spacing: 0.1em;
    margin-bottom: 24px;
  }

  .profile-emoji {
    font-size: 40px;
    margin-bottom: 16px;
    display: block;
  }

  .profile-name {
    font-size: 32px;
    font-weight: 200;
    margin-bottom: 4px;
    letter-spacing: 0.02em;
  }

  .profile-tagline {
    font-size: 13px;
    font-weight: 300;
    color: var(--text-dim);
    font-style: italic;
    margin-bottom: 32px;
    line-height: 1.5;
  }

  .profile-intro {
    font-size: 14px;
    font-weight: 300;
    color: var(--text-dim);
    line-height: 1.7;
    margin-bottom: 32px;
  }

  .profile-divider {
    width: 40px;
    height: 1px;
    background: var(--accent);
    margin-bottom: 24px;
  }

  .detail-label {
    font-family: 'JetBrains Mono', monospace;
    font-size: 9px;
    letter-spacing: 0.15em;
    text-transform: uppercase;
    color: var(--text-muted);
    margin-bottom: 10px;
    margin-top: 20px;
  }

  .detail-value {
    font-size: 13px;
    font-weight: 300;
    color: var(--text-dim);
    line-height: 1.6;
  }

  .config-dots {
    display: flex;
    gap: 6px;
    flex-wrap: wrap;
    margin-top: 4px;
  }

  .config-dot {
    width: 8px;
    height: 8px;
    border-radius: 50%;
    background: var(--text-muted);
    opacity: 0.2;
    position: relative;
    cursor: default;
  }

  .config-dot.active { opacity: 1; }
  .config-dot.active.c-green { background: var(--green); }
  .config-dot.active.c-blue { background: var(--blue); }
  .config-dot.active.c-purple { background: var(--purple); }

  .config-dot .dot-tip {
    position: absolute;
    bottom: calc(100% + 6px);
    left: 50%;
    transform: translateX(-50%);
    font-family: 'JetBrains Mono', monospace;
    font-size: 9px;
    color: var(--text-dim);
    white-space: nowrap;
    opacity: 0;
    pointer-events: none;
    transition: opacity 0.2s;
  }

  .config-dot:hover .dot-tip { opacity: 1; }

  /* Memory visualization */
  .memory-graph {
    display: flex;
    align-items: flex-end;
    gap: 4px;
    height: 48px;
    margin-top: 8px;
  }

  .mem-bar {
    flex: 1;
    min-width: 12px;
    border-radius: 2px 2px 0 0;
    position: relative;
    cursor: default;
    transition: opacity 0.2s;
    opacity: 0.5;
  }

  .mem-bar:hover { opacity: 1; }

  .mem-bar:hover .bar-tip {
    opacity: 1;
  }

  .bar-tip {
    position: absolute;
    bottom: calc(100% + 8px);
    left: 50%;
    transform: translateX(-50%);
    font-family: 'JetBrains Mono', monospace;
    font-size: 9px;
    color: var(--text-dim);
    white-space: nowrap;
    opacity: 0;
    pointer-events: none;
    transition: opacity 0.2s;
    background: var(--surface);
    padding: 3px 8px;
    border-radius: 3px;
    border: 1px solid var(--border);
  }

  .memory-total {
    font-family: 'JetBrains Mono', monospace;
    font-size: 11px;
    color: var(--text-dim);
    margin-top: 8px;
  }

  .sections-list {
    display: flex;
    flex-wrap: wrap;
    gap: 0;
    margin-top: 6px;
  }

  .section-item {
    font-size: 12px;
    font-weight: 300;
    color: var(--text-muted);
  }

  .section-item:not(:last-child)::after {
    content: ' · ';
    color: var(--text-muted);
    opacity: 0.5;
  }

  .knowledge-list {
    margin-top: 8px;
  }

  .knowledge-item {
    display: flex;
    justify-content: space-between;
    align-items: baseline;
    padding: 4px 0;
    font-size: 12px;
    font-weight: 300;
    color: var(--text-dim);
  }

  .knowledge-item span:last-child {
    font-family: 'JetBrains Mono', monospace;
    font-size: 10px;
    color: var(--text-muted);
  }

  /* — Footer — */
  .colophon {
    padding: 40px 80px;
    border-top: 1px solid var(--border);
    display: flex;
    justify-content: space-between;
    align-items: baseline;
  }

  .colophon-text {
    font-family: 'JetBrains Mono', monospace;
    font-size: 9px;
    color: var(--text-muted);
    letter-spacing: 0.1em;
  }

  @media (max-width: 900px) {
    .masthead, .hero, .colophon { padding-left: 32px; padding-right: 32px; }
    .hero-title { font-size: 42px; }
    .profiles { grid-template-columns: 1fr; }
    .profile { border-right: none; }
    .stats-strip { flex-wrap: wrap; }
    .stat-cell { min-width: 50%; }
  }
</style>
</head>
<body>

<header class="masthead">
  <h1>Jellyfish</h1>
  <span class="issue" id="issueDate"></span>
</header>

<section class="hero">
  <h2 class="hero-title">Running beneath<br>the surface.</h2>
  <p class="hero-sub" id="heroSub"></p>
</section>

<div class="stats-strip" id="statsStrip"></div>

<section class="profiles" id="profiles"></section>

<footer class="colophon">
  <span class="colophon-text">Jellyfish — OpenClaw Agent Dashboard</span>
  <span class="colophon-text" id="footerExport"></span>
</footer>

<script>
fetch('data/agents.json')
  .then(r => r.json())
  .then(render)
  .catch(() => {
    document.getElementById('profiles').innerHTML =
      '<div style="padding:80px;text-align:center;color:var(--text-muted);font-style:italic">Run ./export.sh to generate data</div>';
  });

function render(data) {
  const d = new Date(data.exported);
  const months = ['January','February','March','April','May','June','July','August','September','October','November','December'];
  const dateStr = `${months[d.getMonth()]} ${d.getDate()}, ${d.getFullYear()}`;

  document.getElementById('issueDate').textContent = dateStr;
  document.getElementById('footerExport').textContent = `Exported ${d.toLocaleString()}`;

  const totalMemory = data.agents.reduce((s,a) => s + a.memory.longTermLines, 0);
  const totalLogs = data.agents.reduce((s,a) => s + a.memory.dailyLogs.reduce((ss,l) => ss+l.lines, 0), 0);
  const totalSessions = data.agents.reduce((s,a) => s + a.sessions, 0);
  const totalFiles = data.agents.reduce((s,a) => s + a.memory.otherFiles.length, 0);
  const configured = data.agents.reduce((s,a) => s + Object.values(a.config).filter(Boolean).length, 0);

  document.getElementById('heroSub').textContent =
    `${totalMemory} lines of long-term memory · ${totalLogs} lines across ${data.agents.reduce((s,a)=>s+a.memory.dailyLogs.length,0)} daily logs`;

  document.getElementById('statsStrip').innerHTML = [
    ['Agents', data.agents.length],
    ['Sessions', totalSessions],
    ['Memory', `${totalMemory}L`],
    ['Daily Logs', data.agents.reduce((s,a)=>s+a.memory.dailyLogs.length,0)],
    ['Knowledge', totalFiles],
    ['Config', `${configured}/21`],
  ].map(([label, value]) => `
    <div class="stat-cell">
      <div class="stat-number">${value}</div>
      <div class="stat-label">${label}</div>
    </div>
  `).join('');

  const colors = { main: 'c-purple', nemo: 'c-green', nova: 'c-blue' };
  const bgColors = { main: 'var(--purple)', nemo: 'var(--green)', nova: 'var(--blue)' };
  const maxLogLines = Math.max(...data.agents.flatMap(a => a.memory.dailyLogs.map(l => l.lines)), 1);
  const configs = ['soul','identity','memory','user','heartbeat','tools','agents'];

  document.getElementById('profiles').innerHTML = data.agents.map((agent, i) => {
    const emoji = agent.emoji || (agent.id === 'main' ? '🌊' : '?');
    const name = agent.name || agent.id;
    const colorClass = colors[agent.id] || 'c-purple';
    const barColor = bgColors[agent.id] || 'var(--accent)';

    const configDots = configs.map(c =>
      `<div class="config-dot ${agent.config[c] ? 'active' : ''} ${colorClass}">
        <span class="dot-tip">${c}</span>
      </div>`
    ).join('');

    const logBars = agent.memory.dailyLogs.map(log => {
      const h = Math.max(5, (log.lines / maxLogLines) * 44);
      return `<div class="mem-bar" style="height:${h}px;background:${barColor}">
        <span class="bar-tip">${log.date.replace('2026-','')}: ${log.lines}L</span>
      </div>`;
    }).join('') || '<span style="font-size:12px;color:var(--text-muted);font-style:italic">No logs yet</span>';

    const sectionsList = agent.memory.sections.map(s =>
      `<span class="section-item">${s}</span>`
    ).join('');

    const knowledgeList = agent.memory.otherFiles.map(f =>
      `<div class="knowledge-item"><span>${f.name}</span><span>${f.lines}L</span></div>`
    ).join('');

    return `
      <div class="profile">
        <div class="profile-number">0${i+1}</div>
        <span class="profile-emoji">${emoji}</span>
        <div class="profile-name">${name}</div>
        <div class="profile-tagline">${agent.tagline || ''}</div>

        ${agent.soulIntro ? `<div class="profile-intro">${agent.soulIntro}</div>` : ''}

        <div class="profile-divider"></div>

        <div class="detail-label">Configuration</div>
        <div class="config-dots">${configDots}</div>

        <div class="detail-label">Long-term Memory</div>
        <div class="memory-total">${agent.memory.longTermLines} lines</div>
        ${sectionsList ? `<div class="sections-list">${sectionsList}</div>` : ''}

        <div class="detail-label">Daily Activity</div>
        <div class="memory-graph">${logBars}</div>

        ${knowledgeList ? `
        <div class="detail-label">Knowledge Files</div>
        <div class="knowledge-list">${knowledgeList}</div>
        ` : ''}

        <div class="detail-label">Sessions</div>
        <div class="memory-total">${agent.sessions}</div>
      </div>
    `;
  }).join('');
}
</script>

</body>
</html>
