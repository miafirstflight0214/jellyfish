<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Jellyfish</title>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,200;0,9..144,300;0,9..144,400;1,9..144,200;1,9..144,300&family=JetBrains+Mono:wght@300;400&family=Noto+Serif+SC:wght@300;400&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #181716;
    --surface: #211f1e;
    --border: rgba(201,168,124,0.12);
    --text: #e8e2d9;
    --text-dim: #b5b0ab;
    --text-muted: #8a8580;
    --accent: #c9a87c;
    --green: #8ecda0;
    --blue: #7eb3e0;
    --purple: #b8a0d8;
  }
  html[data-theme="light"] {
    --bg: #f5f3f0;
    --surface: #eae7e3;
    --border: rgba(120,100,80,0.15);
    --text: #2a2825;
    --text-dim: #6b6560;
    --text-muted: #9a9590;
    --accent: #8b7355;
    --green: #4a9960;
    --blue: #4a7fa0;
    --purple: #7a60a0;
  }
  * { margin:0; padding:0; box-sizing:border-box; }
  body {
    background: var(--bg); color: var(--text);
    font-family: 'Fraunces', Georgia, serif;
    -webkit-font-smoothing: antialiased;
    min-height: 100vh;
    transition: background 0.4s, color 0.4s;
  }

  /* Masthead */
  .masthead {
    padding: 60px 80px 40px;
    border-bottom: 1px solid var(--border);
    display: flex; align-items: center; justify-content: space-between;
  }
  .masthead h1 {
    font-size: 11px; font-weight: 300;
    letter-spacing: 0.35em; text-transform: uppercase; color: var(--accent);
  }
  .masthead-right { display: flex; align-items: center; gap: 24px; }
  .masthead .issue {
    font-family: 'JetBrains Mono', monospace;
    font-size: 10px; font-weight: 300; color: var(--text-muted); letter-spacing: 0.05em;
  }
  .toggle-btn {
    font-family: 'JetBrains Mono', monospace;
    font-size: 10px; font-weight: 300; color: var(--text-muted);
    letter-spacing: 0.05em; background: none; border: none; cursor: pointer;
    padding: 4px 0; transition: color 0.2s;
  }
  .toggle-btn:hover { color: var(--text); }
  .toggle-sep { color: var(--border); font-size: 12px; user-select: none; }

  /* Hero */
  .hero {
    padding: 80px 80px 60px;
    border-bottom: 1px solid var(--border);
  }
  .hero-title {
    font-size: 72px; font-weight: 200; line-height: 1.05;
    color: var(--text); letter-spacing: -0.02em; max-width: 700px;
  }
  .hero-sub {
    font-size: 16px; font-weight: 300; color: var(--text-dim);
    margin-top: 20px; font-style: italic;
  }

  /* Stats Strip */
  .stats-strip { display: flex; border-bottom: 1px solid var(--border); }
  .stat-cell {
    flex: 1; padding: 32px 40px;
    border-right: 1px solid var(--border); text-align: center;
  }
  .stat-cell:last-child { border-right: none; }
  .stat-number { font-size: 36px; font-weight: 200; color: var(--text); line-height: 1; }
  .stat-label {
    font-family: 'JetBrains Mono', monospace;
    font-size: 9px; letter-spacing: 0.15em; text-transform: uppercase;
    color: var(--text-muted); margin-top: 8px;
  }

  /* Row-aligned sections */
  .section-row {
    display: grid;
    grid-template-columns: 1fr 1fr 1fr;
    border-bottom: 1px solid var(--border);
  }
  .section-cell {
    padding: 32px 48px;
    border-right: 1px solid var(--border);
  }
  .section-cell:last-child { border-right: none; }

  /* Row header spans full width */
  .row-header {
    grid-column: 1 / -1;
    padding: 20px 48px 8px;
    font-family: 'JetBrains Mono', monospace;
    font-size: 9px; letter-spacing: 0.15em; text-transform: uppercase;
    color: var(--text-muted);
    border-bottom: none;
  }

  /* Agent header row */
  .agent-header-cell { padding: 48px 48px 32px; }
  .profile-number {
    font-family: 'JetBrains Mono', monospace;
    font-size: 10px; color: var(--text-muted); letter-spacing: 0.1em; margin-bottom: 20px;
  }
  .profile-emoji { font-size: 40px; margin-bottom: 16px; display: block; }
  .profile-name { font-size: 32px; font-weight: 200; margin-bottom: 4px; letter-spacing: 0.02em; }
  .profile-tagline {
    font-size: 13px; font-weight: 300; color: var(--text-dim);
    font-style: italic; line-height: 1.5; margin-bottom: 20px;
  }
  .profile-intro {
    font-size: 14px; font-weight: 300; color: var(--text-dim); line-height: 1.7;
  }
  .profile-divider { width: 40px; height: 1px; background: var(--accent); margin: 20px 0; }

  /* Config tree */
  .config-tree {
    font-family: 'JetBrains Mono', monospace; font-size: 11px; line-height: 1.8;
  }
  .config-tree .tree-root { color: var(--text-dim); margin-bottom: 2px; }
  .config-tree .tree-item {
    display: flex; align-items: baseline; gap: 8px;
    padding-left: 16px; color: var(--text-dim);
  }
  .config-tree .tree-item.missing { opacity: 0.25; }
  .config-tree .tree-branch {
    color: var(--text-muted); width: 16px; flex-shrink: 0; user-select: none;
  }
  .config-tree .tree-icon {
    width: 6px; height: 6px; border-radius: 50%;
    flex-shrink: 0; margin-right: 2px; display: inline-block;
  }
  .config-tree .tree-lines {
    color: var(--text-muted); font-size: 9px; margin-left: auto;
  }
  .config-tree .tree-group { margin-top: 6px; }
  .config-tree .tree-group-label {
    font-size: 9px; letter-spacing: 0.08em; text-transform: uppercase;
    color: var(--text-muted); opacity: 0.6; padding-left: 16px; margin-bottom: 2px;
  }

  /* Memory */
  .memory-total {
    font-family: 'JetBrains Mono', monospace; font-size: 11px; color: var(--text-dim);
  }
  .sections-list { display: flex; flex-wrap: wrap; gap: 0; margin-top: 6px; }
  .section-item { font-size: 12px; font-weight: 300; color: var(--text-muted); }
  .section-item:not(:last-child)::after { content: ' · '; color: var(--text-muted); opacity: 0.5; }

  /* Activity bars */
  .memory-graph {
    display: flex; align-items: flex-end; gap: 4px; height: 48px; margin-top: 8px;
  }
  .mem-bar {
    flex: 1; min-width: 12px; border-radius: 2px 2px 0 0;
    position: relative; cursor: default; transition: opacity 0.2s; opacity: 0.5;
  }
  .mem-bar:hover { opacity: 1; }
  .mem-bar:hover .bar-tip { opacity: 1; }
  .bar-tip {
    position: absolute; bottom: calc(100% + 8px); left: 50%; transform: translateX(-50%);
    font-family: 'JetBrains Mono', monospace; font-size: 9px; color: var(--text-dim);
    white-space: nowrap; opacity: 0; pointer-events: none; transition: opacity 0.2s;
    background: var(--surface); padding: 3px 8px; border-radius: 3px; border: 1px solid var(--border);
  }

  /* Knowledge */
  .knowledge-list { margin-top: 4px; }
  .knowledge-item {
    display: flex; justify-content: space-between; align-items: baseline;
    padding: 3px 0; font-size: 12px; font-weight: 300; color: var(--text-dim);
  }
  .knowledge-item span:last-child {
    font-family: 'JetBrains Mono', monospace; font-size: 10px; color: var(--text-muted);
  }

  /* Heartbeat tasks */
  .hb-list { margin-top: 4px; }
  .hb-item {
    padding: 4px 0; font-size: 12px; font-weight: 300; color: var(--text-dim);
    line-height: 1.5; display: flex; gap: 8px;
  }
  .hb-bullet {
    color: var(--text-muted); flex-shrink: 0; font-size: 10px; margin-top: 2px;
  }
  .hb-none { font-size: 12px; color: var(--text-muted); font-style: italic; }

  /* Cron cards */
  .cron-status {
    display: inline-block; width: 6px; height: 6px;
    border-radius: 50%; flex-shrink: 0;
  }
  .cron-status.ok { background: var(--green); }
  .cron-status.error { background: #f87171; }
  .cron-status.running { background: var(--blue); }
  .cron-status.idle { background: var(--text-muted); opacity: 0.4; }
  .cron-list { display: flex; flex-direction: column; gap: 12px; }
  .cron-card {
    background: var(--surface); border: 1px solid var(--border);
    border-radius: 6px; padding: 14px 16px;
  }
  .cron-card-top {
    display: flex; align-items: center; gap: 8px; margin-bottom: 8px;
  }
  .cron-name {
    font-family: 'JetBrains Mono', monospace; font-size: 11px; color: var(--text-dim);
  }
  .cron-labels { display: flex; gap: 5px; margin-left: auto; flex-wrap: wrap; justify-content: flex-end; }
  .cron-time {
    font-family: 'JetBrains Mono', monospace; font-size: 10px;
    color: var(--accent);
  }
  .cron-task {
    font-size: 12px; font-weight: 300; color: var(--text-muted);
    line-height: 1.6; margin-bottom: 8px;
  }
  .cron-bottom {
    display: flex; justify-content: space-between; align-items: baseline;
  }
  .cron-meta {
    font-family: 'JetBrains Mono', monospace; font-size: 9px;
    color: var(--text-muted); opacity: 0.5;
  }
  .cron-labels { display: flex; gap: 6px; margin-bottom: 8px; flex-wrap: wrap; }
  .cron-label {
    font-family: 'JetBrains Mono', monospace; font-size: 9px;
    padding: 2px 8px; border-radius: 3px; letter-spacing: 0.03em;
    border: 1px solid var(--border);
  }
  .cron-label.discord { color: var(--blue); border-color: rgba(126,179,224,0.25); }
  .cron-label.file { color: var(--green); border-color: rgba(142,205,160,0.25); }
  .cron-label.art { color: var(--purple); border-color: rgba(184,160,216,0.25); }

  /* Footer */
  .colophon {
    padding: 40px 80px; border-top: 1px solid var(--border);
    display: flex; justify-content: space-between; align-items: baseline;
  }
  .colophon-text {
    font-family: 'JetBrains Mono', monospace; font-size: 9px;
    color: var(--text-muted); letter-spacing: 0.1em;
  }

  @media (max-width: 900px) {
    .masthead, .hero, .colophon { padding-left: 32px; padding-right: 32px; }
    .hero-title { font-size: 42px; }
    .section-row { grid-template-columns: 1fr; }
    .section-cell { border-right: none; }
    .stats-strip { flex-wrap: wrap; }
    .stat-cell { min-width: 50%; }
    .row-header { padding-left: 32px; }
    .section-cell, .agent-header-cell { padding-left: 32px; padding-right: 32px; }
  }
</style>
</head>
<body>

<header class="masthead">
  <h1>Jellyfish</h1>
  <div class="masthead-right">
    <span class="issue" id="issueDate"></span>
    <span class="toggle-sep">·</span>
    <button class="toggle-btn" id="langBtn" onclick="toggleLang()">中文</button>
    <span class="toggle-sep">·</span>
    <button class="toggle-btn" id="themeBtn" onclick="toggleTheme()">Light</button>
  </div>
</header>

<section class="hero">
  <h2 class="hero-title" id="heroTitle">Running beneath<br>the surface.</h2>
  <p class="hero-sub" id="heroSub"></p>
</section>

<div class="stats-strip" id="statsStrip"></div>

<div id="content"></div>

<footer class="colophon">
  <span class="colophon-text">Jellyfish — OpenClaw Agent Dashboard</span>
  <span class="colophon-text" id="footerExport"></span>
</footer>

<script>
const i18n = {
  en: {
    hero: 'Running beneath<br>the surface.',
    heroSub: (mem, lines, days) => `${mem} lines of long-term memory · ${lines} lines across ${days} daily logs`,
    agents: 'Agents', sessions: 'Sessions', memory: 'Memory',
    dailyLogs: 'Daily Logs', knowledge: 'Knowledge', config: 'Config',
    configuration: 'Configuration', longTermMemory: 'Long-term Memory',
    dailyActivity: 'Daily Activity', knowledgeFiles: 'Knowledge Files',
    sessionsLabel: 'Sessions',
    heartbeat: 'Heartbeat',
    cronJobs: 'Scheduled Jobs',
    cronName: 'Name', cronSchedule: 'Schedule', cronAgent: 'Agent', cronStatus: 'Status', cronLast: 'Last Run',
    lines: 'lines', noLogs: 'No logs yet',
    langBtn: '中文', themeLight: 'Light', themeDark: 'Dark',
    persona: 'persona', knowledgeG: 'knowledge', behavior: 'behavior',
  },
  zh: {
    hero: '运行在<br>表面之下。',
    heroSub: (mem, lines, days) => `${mem} 行长期记忆 · ${days} 天日志共 ${lines} 行`,
    agents: '智能体', sessions: '会话', memory: '记忆',
    dailyLogs: '日志', knowledge: '知识库', config: '配置',
    configuration: '配置状态', longTermMemory: '长期记忆',
    dailyActivity: '每日活动', knowledgeFiles: '知识文件',
    sessionsLabel: '会话',
    heartbeat: '心跳',
    cronJobs: '定时任务',
    cronName: '名称', cronSchedule: '时间', cronAgent: '智能体', cronStatus: '状态', cronLast: '上次运行',
    lines: '行', noLogs: '暂无日志',
    langBtn: 'EN', themeLight: '浅色', themeDark: '深色',
    persona: '人格', knowledgeG: '知识', behavior: '行为',
  }
};

let currentLang = localStorage.getItem('jf-lang') || 'en';
let currentTheme = localStorage.getItem('jf-theme') || 'dark';
let agentData = null;

if (currentTheme === 'light') document.documentElement.dataset.theme = 'light';

function toggleLang() {
  currentLang = currentLang === 'en' ? 'zh' : 'en';
  localStorage.setItem('jf-lang', currentLang);
  document.documentElement.lang = currentLang;
  if (agentData) render(agentData);
  updateToggles();
}

function toggleTheme() {
  currentTheme = currentTheme === 'dark' ? 'light' : 'dark';
  localStorage.setItem('jf-theme', currentTheme);
  if (currentTheme === 'light') document.documentElement.dataset.theme = 'light';
  else delete document.documentElement.dataset.theme;
  updateToggles();
}

function updateToggles() {
  const t = i18n[currentLang];
  document.getElementById('langBtn').textContent = t.langBtn;
  document.getElementById('themeBtn').textContent = currentTheme === 'dark' ? t.themeLight : t.themeDark;
}

function cronToTime(expr, tz) {
  // Parse "M H * * *" style cron to readable time
  if (!expr) return '—';
  const parts = expr.split(/\s+/);
  if (parts.length < 2) return expr;
  const min = parts[0], hour = parts[1];
  const pad = n => String(n).padStart(2, '0');
  if (hour.includes(',')) {
    return hour.split(',').map(h => `${pad(h)}:${pad(min)}`).join(' / ');
  }
  return `${pad(hour)}:${pad(min)}`;
}

fetch('data/agents.json')
  .then(r => r.json())
  .then(data => { agentData = data; render(data); updateToggles(); })
  .catch(() => {
    document.getElementById('content').innerHTML =
      '<div style="padding:80px;text-align:center;color:var(--text-muted);font-style:italic">Run ./export.sh to generate data</div>';
  });

function render(data) {
  const t = i18n[currentLang];
  const d = new Date(data.exported);
  const months = ['January','February','March','April','May','June','July','August','September','October','November','December'];
  const zhMonths = ['1月','2月','3月','4月','5月','6月','7月','8月','9月','10月','11月','12月'];

  document.getElementById('issueDate').textContent = currentLang === 'zh'
    ? `${d.getFullYear()}年${zhMonths[d.getMonth()]}${d.getDate()}日`
    : `${months[d.getMonth()]} ${d.getDate()}, ${d.getFullYear()}`;
  document.getElementById('footerExport').textContent =
    currentLang === 'zh' ? `导出于 ${d.toLocaleString('zh-CN')}` : `Exported ${d.toLocaleString()}`;
  document.getElementById('heroTitle').innerHTML = t.hero;

  const totalMemory = data.agents.reduce((s,a) => s + a.memory.longTermLines, 0);
  const totalLogLines = data.agents.reduce((s,a) => s + a.memory.dailyLogs.reduce((ss,l) => ss+l.lines, 0), 0);
  const totalDays = data.agents.reduce((s,a) => s + a.memory.dailyLogs.length, 0);
  const totalSessions = data.agents.reduce((s,a) => s + a.sessions, 0);
  const totalFiles = data.agents.reduce((s,a) => s + a.memory.otherFiles.length, 0);
  const configured = data.agents.reduce((s,a) => s + Object.values(a.config).filter(Boolean).length, 0);

  document.getElementById('heroSub').textContent = t.heroSub(totalMemory, totalLogLines, totalDays);

  document.getElementById('statsStrip').innerHTML = [
    [t.agents, data.agents.length],
    [t.sessions, totalSessions],
    [t.memory, `${totalMemory}L`],
    [t.dailyLogs, totalDays],
    [t.knowledge, totalFiles],
    [t.config, `${configured}/21`],
  ].map(([label, value]) => `
    <div class="stat-cell"><div class="stat-number">${value}</div><div class="stat-label">${label}</div></div>
  `).join('');

  const bgColors = { main: 'var(--purple)', nemo: 'var(--green)', nova: 'var(--blue)' };
  const maxLogLines = Math.max(...data.agents.flatMap(a => a.memory.dailyLogs.map(l => l.lines)), 1);
  const configs = ['soul','identity','memory','user','heartbeat','tools','agents'];

  // Build row-aligned sections
  let html = '';

  // Row 1: Agent headers
  html += '<div class="section-row">';
  data.agents.forEach((agent, i) => {
    const emoji = agent.emoji || '?';
    const name = agent.name || agent.id;
    const tagline = currentLang === 'zh' ? (agent.tagline || '') : (agent.taglineEn || agent.tagline || '');
    const intro = currentLang === 'zh' ? (agent.soulIntro || '') : (agent.soulIntroEn || agent.soulIntro || '');
    html += `<div class="section-cell agent-header-cell">
      <div class="profile-number">0${i+1}</div>
      <span class="profile-emoji">${emoji}</span>
      <div class="profile-name">${name}</div>
      ${tagline ? `<div class="profile-tagline">${tagline}</div>` : ''}
      ${intro ? `<div class="profile-intro">${intro}</div>` : ''}
    </div>`;
  });
  html += '</div>';

  // Row 2: Daily Activity
  html += `<div class="section-row"><div class="row-header">${t.dailyActivity}</div></div>`;
  html += '<div class="section-row">';
  data.agents.forEach(agent => {
    const barColor = bgColors[agent.id] || 'var(--accent)';
    const logBars = agent.memory.dailyLogs.map(log => {
      const h = Math.max(5, (log.lines / maxLogLines) * 44);
      return `<div class="mem-bar" style="height:${h}px;background:${barColor}">
        <span class="bar-tip">${log.date.replace('2026-','')}: ${log.lines}L</span>
      </div>`;
    }).join('') || `<span style="font-size:12px;color:var(--text-muted);font-style:italic">${t.noLogs}</span>`;
    html += `<div class="section-cell"><div class="memory-graph">${logBars}</div></div>`;
  });
  html += '</div>';

  // Row 3: Configuration
  html += `<div class="section-row"><div class="row-header">${t.configuration}</div></div>`;
  html += '<div class="section-row">';
  data.agents.forEach(agent => {
    const barColor = bgColors[agent.id] || 'var(--accent)';
    const cfData = agent.configFiles || configs.map(c => ({name:c.toUpperCase()+'.md', exists:agent.config[c], lines:0}));
    const cfMap = {}; cfData.forEach(f => cfMap[f.name] = f);
    const groups = [
      { key: 'persona', files: ['SOUL.md','IDENTITY.md'] },
      { key: 'knowledgeG', files: ['MEMORY.md','USER.md'] },
      { key: 'behavior', files: ['HEARTBEAT.md','TOOLS.md','AGENTS.md'] },
    ];

    let tree = `<div class="config-tree"><div class="tree-root">${agent.id}/</div>`;
    groups.forEach(g => {
      tree += `<div class="tree-group"><div class="tree-group-label">${t[g.key]}</div>`;
      g.files.forEach((fname, fi) => {
        const f = cfMap[fname] || {exists:false, lines:0};
        const branch = fi === g.files.length - 1 ? '└─' : '├─';
        const cls = f.exists ? '' : ' missing';
        const dot = f.exists
          ? `<span class="tree-icon" style="background:${barColor}"></span>`
          : `<span class="tree-icon" style="background:var(--text-muted);opacity:0.3"></span>`;
        const lines = f.exists ? `<span class="tree-lines">${f.lines}L</span>` : `<span class="tree-lines">—</span>`;
        tree += `<div class="tree-item${cls}"><span class="tree-branch">${branch}</span>${dot} ${fname} ${lines}</div>`;
      });
      tree += '</div>';
    });
    tree += '</div>';
    html += `<div class="section-cell">${tree}</div>`;
  });
  html += '</div>';

  // Row 4: Knowledge Files
  html += `<div class="section-row"><div class="row-header">${t.knowledgeFiles}</div></div>`;
  // Shared files - full width
  const sharedFiles = (data.shared || []).filter(f => f.name !== 'README.md');
  if (sharedFiles.length > 0) {
    html += '<div class="section-row">';
    html += '<div class="section-cell" style="grid-column:1/-1"><div class="knowledge-list" style="display:grid;grid-template-columns:repeat(3,1fr);gap:0 24px">';
    sharedFiles.forEach(f => {
      const name = f.name.split('/').pop();
      html += `<div class="knowledge-item"><span>${name}</span><span>${f.lines}L</span></div>`;
    });
    html += '</div></div>';
    html += '</div>';
  }
  // Per-agent files
  html += '<div class="section-row">';
  data.agents.forEach(agent => {
    const agentList = agent.memory.otherFiles.map(f =>
      `<div class="knowledge-item"><span>${f.name}</span><span>${f.lines}L</span></div>`
    ).join('') || `<span style="font-size:12px;color:var(--text-muted)">—</span>`;
    html += `<div class="section-cell"><div class="knowledge-list">${agentList}</div></div>`;
  });
  html += '</div>';

  // Row 6: Sessions & Heartbeat (compact)
  html += `<div class="section-row"><div class="row-header">${t.sessionsLabel} & ${t.heartbeat}</div></div>`;
  html += '<div class="section-row">';
  data.agents.forEach(agent => {
    const interval = agent.heartbeatInterval || '—';
    const intervalLabel = interval === 'disabled'
      ? (currentLang === 'zh' ? '已禁用' : 'disabled')
      : (currentLang === 'zh' ? `每 ${interval}` : `every ${interval}`);
    html += `<div class="section-cell">
      <div style="display:flex;justify-content:space-between;align-items:baseline">
        <div class="memory-total">${agent.sessions} ${t.sessionsLabel.toLowerCase()}</div>
        <div style="font-family:'JetBrains Mono',monospace;font-size:10px;color:var(--text-muted)">${t.heartbeat}: ${intervalLabel}</div>
      </div>
    </div>`;
  });
  html += '</div>';

  // Cron Jobs — grouped by agent
  const crons = data.crons || [];
  if (crons.length > 0) {
    const agentCrons = {};
    data.agents.forEach(a => agentCrons[a.id] = []);
    crons.forEach(c => {
      const aid = c.agent || 'unknown';
      if (!agentCrons[aid]) agentCrons[aid] = [];
      agentCrons[aid].push(c);
    });

    html += `<div class="section-row"><div class="row-header">${t.cronJobs}</div></div>`;
    html += '<div class="section-row">';
    data.agents.forEach(agent => {
      const jobs = agentCrons[agent.id] || [];
      if (jobs.length === 0) {
        html += `<div class="section-cell"><span style="font-size:12px;color:var(--text-muted)">—</span></div>`;
        return;
      }
      html += `<div class="section-cell"><div class="cron-list">`;
      jobs.forEach(c => {
        const statusCls = c.status || 'idle';
        const timeStr = cronToTime(c.schedule, c.tz);
        const lastRun = c.lastRun
          ? new Date(c.lastRun).toLocaleString(currentLang === 'zh' ? 'zh-CN' : 'en', {month:'short',day:'numeric',hour:'2-digit',minute:'2-digit'})
          : '—';
        const task = c.task || '';
        let summary = task.replace(/^你是.*?。/,'').replace(/^先.*?。/,'').trim();
        if (summary.length > 80) summary = summary.substring(0, 80) + '…';

        const labelNames = { discord: '→ Discord', file: '→ System Files', art: '→ Art Generation' };
        const labelNamesZh = { discord: '→ Discord', file: '→ 系统文件', art: '→ 生成画作' };
        const outputs = c.outputs || ['discord'];
        const labels = outputs.map(o => {
          const name = (currentLang === 'zh' ? labelNamesZh[o] : labelNames[o]) || o;
          return `<span class="cron-label ${o}">${name}</span>`;
        }).join('');

        html += `<div class="cron-card">
          <div class="cron-card-top">
            <span class="cron-status ${statusCls}"></span>
            <span class="cron-name">${c.name}</span>
            <div class="cron-labels">${labels}</div>
          </div>
          ${summary ? `<div class="cron-task">${summary}</div>` : ''}
          <div class="cron-bottom">
            <span class="cron-meta">${currentLang === 'zh' ? '上次' : 'Last'}: ${lastRun}</span>
            <span class="cron-time">${timeStr}</span>
          </div>
        </div>`;
      });
      html += `</div></div>`;
    });
    html += '</div>';
  }

  document.getElementById('content').innerHTML = html;
}
</script>

</body>
</html>
